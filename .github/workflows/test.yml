name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  golden:
    runs-on: ubuntu-latest
    defaults:
      run:
        # The app lives in a subfolder of the repo — run npm there.
        working-directory: fdd-engine-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
